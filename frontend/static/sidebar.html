<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITI AI</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-app: #F4F6F9;          
            --card-dark: #12142D;       
            --accent-orange: #FF623D;   
            --accent-grad: linear-gradient(135deg, #FF623D 0%, #FFA23A 100%);
            --text-main: #2D3142;
            
            --glow-orange: 0 8px 20px rgba(255, 98, 61, 0.35);
            --shadow-card: 0 15px 35px rgba(18, 20, 45, 0.15);
        }

        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0; padding: 0; 
            background-color: var(--bg-app); 
            height: 100vh; display: flex; flex-direction: column; 
            overflow: hidden; color: var(--text-main);
        }

        .header {
            background: transparent;
            padding: 20px 20px 10px 20px;
            display: flex; align-items: center; justify-content: space-between;
            z-index: 10;
        }

        .brand { display: flex; align-items: center; gap: 14px; }

        .avatar-circle {
            width: 42px; height: 42px;
            background: var(--accent-grad); color: white;
            border-radius: 16px; 
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; box-shadow: var(--glow-orange);
        }

        .brand-text h1 { margin: 0; font-size: 18px; font-weight: 800; color: var(--card-dark); }
        .brand-text span {
            font-size: 11px; color: #10B981; font-weight: 700;
            display: flex; align-items: center; gap: 4px; text-transform: uppercase;
        }

        #chat-container {
            flex: 1; padding: 10px 20px 180px 20px; 
            overflow-y: auto; display: flex; flex-direction: column; gap: 20px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 88%; padding: 16px 20px; font-size: 13.5px; line-height: 1.6; 
            position: relative; word-wrap: break-word; 
        }
        .msg-agent {
            align-self: flex-start; background: white;
            border-radius: 4px 20px 20px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }
        .msg-agent::before {
            content: "🐒 Titi AI"; display: block; font-size: 11px;
            font-weight: 800; color: var(--card-dark); margin-bottom: 8px; opacity: 0.8;
        }

        .msg-user {
            align-self: flex-end; background: var(--accent-grad); color: white;
            border-radius: 20px 4px 20px 20px; font-weight: 500;
            box-shadow: var(--glow-orange);
        }

        .input-wrapper {
            position: fixed; bottom: 20px; left: 15px; right: 15px; z-index: 100;
        }

        .input-card {
            background: var(--card-dark);
            border-radius: 28px; padding: 16px;
            box-shadow: var(--shadow-card);
            display: flex; flex-direction: column; gap: 12px;
            position: relative; overflow: hidden;
        }

        .input-card::before {
            content: ""; position: absolute; top: -40px; right: -20px;
            width: 120px; height: 120px; border-radius: 50%;
            background: radial-gradient(circle, rgba(255,98,61,0.2) 0%, transparent 70%);
            pointer-events: none;
        }
        .input-card::after {
            content: ""; position: absolute; bottom: -30px; left: -30px;
            width: 100px; height: 100px; border-radius: 50%;
            background: radial-gradient(circle, rgba(138,43,226,0.15) 0%, transparent 70%);
            pointer-events: none;
        }

        .context-pill {
            display: inline-flex; align-items: center; gap: 8px;
            font-size: 11px; font-weight: 600; color: #A0AABF;
            padding: 4px 12px; background: rgba(255,255,255,0.05); 
            border-radius: 12px; align-self: flex-start; z-index: 2;
        }
        .context-pill.active { color: white; background: rgba(255,98,61,0.2); border: 1px solid rgba(255,98,61,0.4); }
        .dot { width: 6px; height: 6px; background: #4B5563; border-radius: 50%; }
        .active .dot { background: var(--accent-orange); box-shadow: 0 0 8px var(--accent-orange); }

        .mode-container { display: flex; gap: 8px; z-index: 2; }
        .mode-btn {
            flex: 1; padding: 10px; border: none; background: rgba(255,255,255,0.03);
            border-radius: 16px; cursor: pointer; font-size: 11px; font-weight: 700;
            color: #78829D; transition: all 0.2s;
        }
        .mode-btn.active { background: rgba(255,255,255,0.1); color: white; }
        
        .input-box {
            display: flex; gap: 10px; align-items: flex-end;
            background: rgba(0,0,0,0.2); border-radius: 20px; 
            padding: 8px 8px 8px 16px; z-index: 2;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .input-box:focus-within { border-color: rgba(255,98,61,0.5); }

        textarea {
            flex: 1; border: none; background: transparent;
            padding: 8px 0; font-family: inherit; font-size: 14px; font-weight: 500;
            color: white; resize: none; height: 36px; max-height: 100px; outline: none;
        }
        textarea::placeholder { color: #5B647A; }

        button#send-btn {
            background: var(--accent-grad); color: white; border: none;
            width: 40px; height: 40px; border-radius: 14px; 
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: var(--glow-orange); transition: transform 0.15s;
        }
        button#send-btn:hover { transform: scale(1.08); }
        button#send-btn:disabled { background: #2A2D46; box-shadow: none; color: #5B647A; cursor: not-allowed; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
    </style>
</head>
<body>

    <!-- Header Branding -->
    <div class="header">
        <div class="brand">
            <div class="avatar-circle">🐒</div>
            <div class="brand-text">
                <h1>TITI AI</h1>
                <span>Online</span>
            </div>
        </div>
        <button onclick="location.reload()" style="background:none; border:none; color:#999; cursor:pointer;" title="Reiniciar panel">↻</button>
    </div>

    <!-- Chat -->
    <div id="chat-container">
        <!-- Mensaje de bienvenida -->
        <div class="message msg-agent">
            ¡Hola! Soy <b>Titi</b>, tu asistente de investigación.<br><br>
            Como un buen tití, soy rápido y curioso. Selecciona un texto en tu tesis y dime qué necesitas (refutar, expandir, jurisprudencia).
        </div>
    </div>

    <!-- Input -->
    <div class="input-wrapper">
        <div class="input-card">
            <div id="context-pill" class="context-pill">
                <div class="dot"></div>
                <span id="context-text">Ningún texto seleccionado...</span>
            </div>
            
            <div class="mode-container">
                <button id="btn-mode-academic" class="mode-btn active" onclick="setMode('academic')">Académico</button>
                <button id="btn-mode-legal" class="mode-btn" onclick="setMode('legal')">Jurídico</button>
            </div>

            <div class="input-box">
                <textarea id="user-input" placeholder="Instruye a Titi..." oninput="autoResize(this)" onkeydown="handleEnter(event)"></textarea>
                <button id="send-btn" onclick="sendMessage()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Inyectamos nuestra lógica al final para que cargue después de construir la interfaz -->
    <script src="client.js"></script>
</body>
</html>
